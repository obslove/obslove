# You can put custom rules here
# Window/layer rules: https://wiki.hyprland.org/Configuring/Window-Rules/
# Workspace rules: https://wiki.hyprland.org/Configuring/Workspace-Rules/

# ######## Window rules ########

# Uncomment to apply global transparency to all windows:
  windowrule = opacity 0.60 override 0.60 override, match:class .*

# Disable blur for all xwayland apps
  windowrule = no_blur on, match:xwayland 1

# Auto-start apps: keep workspace placement and avoid focus stealing on startup
windowrule = match:class ^(zen|google-chrome|google-chrome-stable)$, workspace 1 silent, no_initial_focus on, focus_on_activate off
windowrule = match:class ^spotify$, workspace 2 silent, no_initial_focus on, focus_on_activate off
windowrule = match:class ^(code|Code|code-oss)$, workspace 3 silent, no_initial_focus on, focus_on_activate off
windowrule = match:class ^(discord|Discord)$, workspace 4 silent, no_initial_focus on, focus_on_activate off
windowrule = match:class ^(steam|Steam)$, workspace 5 silent, no_initial_focus on, focus_on_activate off